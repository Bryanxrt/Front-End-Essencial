<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <title>Exercicio 2</title>
</head>

<body>
    <div class="card">
        <div class="dia">
            <img class="promocao" src="Imagens/image.png" alt="">
        </div>
        <h1>Samsung Galaxy S26 Ultra</h1>
        <div class="avaliacoes">
            <span class="estrelas">★★★★★</span>
            <span class="info">4.8 (2.3k avaliações)</span>
        </div>
        <div class="desc-img">
            <ul>
                <li>Câmera de 200 MP</li>
                <li>Bateria de 5000 mAh 45W</li>
                <li>Tela AMOLED 6.9"</li>
                <li>Processador Snapdragon 8 Elite</li>
                <li>RAM de 12 GB / 1 TB</li>
                <li>S Pen inclusa</li>
            </ul>
            <img class="s26" src="Imagens/S26.png" alt="Samsung Galaxy S26 Ultra">
        </div>
        <p class="preco">R$ 8.899,00 <span>R$ 10.999,00</span></p>
        <button>
            <a href="https://shop.samsung.com/br/galaxy-s26-ultra/p" target="_blank">COMPRAR</a>
        </button>
    </div>
</body>

</html>
